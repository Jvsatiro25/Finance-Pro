<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Notas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #22d3ee;
            --success: #10b981; --danger: #ef4444; --text: #f1f5f9; --border: #334155;
            --warn: #f59e0b; --sidebar-w: 260px;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        .main-content { padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; }

        .top-bar {
            display: flex; align-items: center; padding: 15px 20px;
            background: var(--card-bg); border-bottom: 1px solid var(--border); gap: 20px;
        }
        .menu-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; }
        .nav-logo { font-size: 1.3rem; font-weight: 800; color: var(--accent); text-decoration: none; }

        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w));
            width: var(--sidebar-w); height: 100%;
            background: #111827; border-right: 1px solid var(--border);
            transition: 0.3s ease; z-index: 1000; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .close-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }
        .side-link {
            padding: 12px 15px; border-radius: 8px; text-decoration: none;
            color: var(--text); font-weight: 600; transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .side-link:hover { background: var(--card-bg); color: var(--accent); }
        .side-link.active { background: var(--accent); color: var(--bg); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }
        .overlay.active { display: block; }

        .note-input-area { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; }
        textarea { 
            width: 100%; background: #0f172a; border: 1px solid var(--border); 
            color: white; padding: 15px; border-radius: 8px; font-size: 1rem; 
            resize: vertical; min-height: 120px; outline: none; margin-bottom: 12px;
            font-family: inherit;
        }
        textarea:focus { border-color: var(--accent); }

        .input-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; margin-bottom: 12px; }
        @media (max-width: 500px) { .input-row { grid-template-columns: 1fr; } }

        .deadline-group { display: flex; flex-direction: column; gap: 4px; }
        .deadline-group input[type="date"] {
            background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 10px 12px; border-radius: 8px;
            font-size: 0.9rem; outline: none; min-width: 160px;
            color-scheme: dark;
        }
        .deadline-group input[type="date"]:focus { border-color: var(--accent); }

        .btn-save { background: var(--accent); color: var(--bg); border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; }

        .notes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        @media (max-width: 600px) { .notes-grid { grid-template-columns: 1fr; } }

        .note-card { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border); position: relative; 
            animation: fadeIn 0.3s ease; display: flex; flex-direction: column;
        }
        .note-card.expired { border-color: var(--danger); background: #1e1520; }
        .note-card.urgent { border-color: var(--warn); background: #1e1a10; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .note-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: flex-start; }
        .note-meta { display: flex; flex-direction: column; gap: 4px; }
        .note-date { font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
        
        .deadline-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.65rem; font-weight: 800; padding: 3px 8px;
            border-radius: 50px; text-transform: uppercase;
        }
        .deadline-badge.ok { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid var(--success); }
        .deadline-badge.urgent { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid var(--warn); }
        .deadline-badge.expired { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }

        .btn-delete { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 5px; flex-shrink: 0; }
        .note-text { white-space: pre-wrap; line-height: 1.6; color: #cbd5e1; font-size: 0.95rem; flex: 1; }

        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 8px; }

        /* Edit Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--card-bg); border: 1px solid var(--accent);
            border-radius: 16px; padding: 24px; width: 100%; max-width: 500px;
            transform: translateY(20px); transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-title { font-weight: 800; font-size: 1rem; color: var(--accent); margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn-modal-save { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; flex: 1; font-size: 0.95rem; font-family: inherit; }
        .btn-modal-cancel { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; }

        /* Make note cards clickable */
        .note-card { cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
        .note-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .note-card.expired:hover { border-color: var(--danger); }
        .note-card.urgent:hover { border-color: var(--warn); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="nav-logo">Finance Pro</span>
        <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    <div class="side-menu">
        <a href="index.html" class="side-link"><span>📊</span> Painel Principal</a>
        <a href="diaadia.html" class="side-link"><span>📅</span> Dia a Dia</a>
        <a href="notas.html" class="side-link active"><span>📝</span> Anotações</a>
        <a href="combustivel.html" class="side-link"><span>⛽</span> Combustível</a>
        <a href="#" class="side-link" onclick="alert('Funcionalidade em breve!')"><span>⚙️</span> Configurações</a>
    </div>
</div>

<header class="top-bar">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="nav-logo">Finance Pro</a>
</header>

<main class="main-content">
    <div class="container">

        <div class="note-input-area">
            <label>Nova Anotação / Lembrete</label>
            <textarea id="note-text" placeholder="Escreva aqui suas ideias ou lembretes financeiros..."></textarea>
            <div class="input-row">
                <div class="deadline-group">
                    <label>Data Limite (opcional)</label>
                    <input type="date" id="note-deadline">
                </div>
                <div></div>
            </div>
            <button class="btn-save" onclick="addNote()">Salvar Anotação 📌</button>
        </div>

        <div id="notes-grid" class="notes-grid"></div>
    </div>
</main>

<script>
    let notes = JSON.parse(localStorage.getItem('finance_pro_notes')) || [];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function saveNotes() {
        localStorage.setItem('finance_pro_notes', JSON.stringify(notes));
        renderNotes();
    }

    function addNote() {
        const textInput = document.getElementById('note-text');
        const deadlineInput = document.getElementById('note-deadline');
        const text = textInput.value;
        if (!text.trim()) return;

        const newNote = {
            id: Date.now(),
            text: text,
            deadline: deadlineInput.value || null,
            date: new Date().toLocaleString('pt-BR', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            })
        };

        notes.unshift(newNote);
        textInput.value = '';
        deadlineInput.value = '';
        saveNotes();
    }

    function deleteNote(id) {
        notes = notes.filter(n => n.id !== id);
        saveNotes();
    }

    function getDeadlineInfo(deadline) {
        if (!deadline) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        const dl = new Date(deadline + 'T00:00:00');
        const diffDays = Math.round((dl - today) / (1000*60*60*24));

        if (diffDays < 0) {
            return { cls: 'expired', label: `Vencida há ${Math.abs(diffDays)}d`, cardCls: 'expired' };
        } else if (diffDays <= 3) {
            return { cls: 'urgent', label: diffDays === 0 ? 'Vence hoje!' : `${diffDays}d restante${diffDays > 1 ? 's' : ''}`, cardCls: 'urgent' };
        } else {
            const fmt = new Date(deadline + 'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
            return { cls: 'ok', label: `Até ${fmt}`, cardCls: '' };
        }
    }

    function renderNotes() {
        const grid = document.getElementById('notes-grid');
        grid.innerHTML = '';

        if (notes.length === 0) {
            grid.innerHTML = `<p style="color: #64748b; text-align: center; grid-column: 1/-1; margin-top: 20px;">Nenhuma nota salva ainda.</p>`;
            return;
        }

        notes.forEach(note => {
            const dlInfo = getDeadlineInfo(note.deadline);
            const cardExtra = dlInfo ? dlInfo.cardCls : '';

            const card = document.createElement('div');
            card.className = `note-card ${cardExtra}`;

            const deadlineBadge = dlInfo
                ? `<span class="deadline-badge ${dlInfo.cls}">⏰ ${dlInfo.label}</span>`
                : '';

            card.innerHTML = `
                <div class="note-header">
                    <div class="note-meta">
                        <span class="note-date">🗓️ ${note.date}</span>
                        ${deadlineBadge}
                    </div>
                    <button class="btn-delete">✕</button>
                </div>
                <div class="note-text"></div>`;

            // Texto inserido via textContent para evitar quebra de HTML
            card.querySelector('.note-text').textContent = note.text;
            // Botão de excluir via addEventListener, sem onclick inline
            card.querySelector('.btn-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteNote(note.id); });
            card.addEventListener('click', () => openEdit(note));

            grid.appendChild(card);
        });
    }


    let editingId = null;

    function openEdit(note) {
        editingId = note.id;
        document.getElementById('edit-text').value = note.text;
        document.getElementById('edit-deadline').value = note.deadline || '';
        document.getElementById('edit-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('active');
        editingId = null;
    }

    function handleModalClick(e) {
        if (e.target === document.getElementById('edit-modal')) closeModal();
    }

    function saveEdit() {
        const text = document.getElementById('edit-text').value.trim();
        if (!text) return;
        const idx = notes.findIndex(n => n.id === editingId);
        if (idx >= 0) {
            notes[idx].text = text;
            notes[idx].deadline = document.getElementById('edit-deadline').value || null;
        }
        closeModal();
        saveNotes();
    }

    window.onload = renderNotes;
</script>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="handleModalClick(event)">
    <div class="modal">
        <div class="modal-title">✏️ Editar Anotação</div>
        <label>Texto</label>
        <textarea id="edit-text" style="min-height:140px;margin-bottom:12px;width:100%;"></textarea>
        <div class="deadline-group">
            <label>Data Limite (opcional)</label>
            <input type="date" id="edit-deadline" style="width:100%;margin-bottom:0;">
        </div>
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-modal-save" onclick="saveEdit()">💾 Salvar</button>
        </div>
    </div>
</div>
</body>
</html>
