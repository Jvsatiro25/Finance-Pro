<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Smart Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #22d3ee;
            --success: #10b981; --danger: #ef4444; --text: #f1f5f9; --border: #334155;
            --locked: #64748b; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .main-content { padding: 20px; margin-left: 0; }
        .container { max-width: 1200px; margin: auto; }
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); gap: 20px; }
        .menu-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
        .nav-logo { font-size: 1.3rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .sidebar { position: fixed; top: 0; left: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100%; background: #111827; border-right: 1px solid var(--border); transition: 0.3s ease; z-index: 1000; padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .close-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }
        .side-link { padding: 12px 15px; border-radius: 8px; text-decoration: none; color: var(--text); font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .side-link:hover { background: var(--card-bg); color: var(--accent); }
        .side-link.active { background: var(--accent); color: var(--bg); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .month-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .month-tab { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; cursor: pointer; white-space: nowrap; color: #94a3b8; font-weight: 600; font-size: 0.85rem; }
        .month-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .top-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 900px) { .top-grid { grid-template-columns: 1fr; } }
        .header-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .income-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .income-group { grid-template-columns: 1fr; } }
        .summary-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .summary-pair { grid-template-columns: 1fr; } }
        .stat-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-card.green { border-color: var(--success); }
        .stat-card.red { border-color: var(--danger); }
        .stat-card h2 { margin: 6px 0 0 0; font-size: 1.5rem; }
        .reserve-card { background: linear-gradient(145deg, #064e3b, #0f172a); padding: 20px; border-radius: 16px; border: 1px solid var(--success); text-align: center; }
        .reserve-card.negative { background: linear-gradient(145deg, #7f1d1d, #0f172a); border-color: var(--danger); }
        .reserve-card h2 { margin: 6px 0 0 0; font-size: 1.8rem; font-weight: 800; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }
        .section-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); overflow: hidden; }
        .card-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title-left { display: flex; align-items: center; gap: 10px; }
        .card-total-badge { font-size: 0.72rem; font-weight: 800; padding: 3px 9px; border-radius: 50px; background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); letter-spacing: 0.02em; }
        .card-total-badge.extra { background: rgba(16,185,129,0.12); color: #34d399; border-color: rgba(16,185,129,0.25); }
        .col-headers { display: grid; grid-template-columns: 1.8fr 1.2fr 1.2fr 48px 40px; gap: 8px; margin-bottom: 4px; padding: 0 2px; }
        .col-headers span { font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: 700; }
        .row { display: grid; grid-template-columns: 1.8fr 1.2fr 1.2fr 48px 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
        .due-input { text-align: center; padding: 8px 4px !important; font-size: 0.82rem !important; color: var(--warn) !important; border-color: rgba(245,158,11,0.3) !important; }
        .due-input:focus { border-color: var(--warn) !important; }
        .due-input::placeholder { color: #475569; font-size: 0.7rem; }
        input, select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px 8px; border-radius: 8px; width: 100%; font-size: 0.95rem; outline: none; }
        input:focus, select:focus { border-color: var(--accent); }
        .weeks-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 15px; margin-top: 20px; }
        .week-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); border-left: 6px solid var(--success); }
        .week-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .week-dates { font-size: 0.65rem; color: #94a3b8; font-weight: 600; }
        .status-badge { font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; display: none; }
        .week-card.past { opacity: 0.6; border-left-color: var(--locked); background: #161e2d; }
        .week-card.past .status-badge { display: inline-block; background: var(--locked); color: white; }
        .week-card.over { border-left-color: var(--danger); }
        .week-budget-row { display: flex; margin: 8px 0 12px 0; gap: 0; }
        .week-budget-block { text-align: center; flex: 1; padding: 8px 4px; }
        .week-budget-block:first-child { border-right: 1px solid var(--border); }
        .week-budget-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .w-budget-val { font-size: 1.05rem; font-weight: 800; color: var(--accent); }
        .w-meta { font-size: 1.05rem; font-weight: 800; color: var(--success); }
        .week-items { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .week-item-row { display: grid; grid-template-columns: 1fr auto 28px; gap: 6px; margin-bottom: 6px; align-items: center; }
        .week-item-row input { padding: 8px 6px; font-size: 0.85rem; }
        .btn-del-item { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 4px; }
        .week-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border); }
        .week-total-label { font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .week-total-val { font-size: 1rem; font-weight: 800; color: var(--accent); }
        .btn-add-item { background: #1e3a2f; color: var(--success); border: 1px solid var(--success); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 700; width: 100%; margin-top: 8px; }
        .btn-add-item:hover { background: var(--success); color: white; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .btn-add { background: var(--success); color: white; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="nav-logo">Finance Pro</span>
        <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    <div class="side-menu">
        <a href="index.html" class="side-link active"><span>📊</span> Painel Principal</a>
        <a href="diaadia.html" class="side-link"><span>📅</span> Dia a Dia</a>
        <a href="notas.html" class="side-link"><span>📝</span> Anotações</a>
        <a href="combustivel.html" class="side-link"><span>⛽</span> Combustível</a>
        <a href="#" class="side-link" onclick="alert('Funcionalidade em breve!')"><span>⚙️</span> Configurações</a>
    </div>
</div>
<header class="top-bar">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <a href="#" class="nav-logo">Finance Pro</a>
</header>
<main class="main-content">
    <div class="container">
        <div class="month-scroller" id="month-tabs"></div>
        <div class="top-grid">
            <div class="header-card">
                <label>Estratégia</label>
                <select id="smart-strategy" onchange="calculate()">
                    <option value="balanced">Equilibrado (Reparte a sobra)</option>
                    <option value="reserve">Reserva (Sobra vira lucro)</option>
                </select>
            </div>
            <div class="header-card">
                <div class="income-group">
                    <div><label>Renda Fixa</label><input type="text" id="income" placeholder="R$ 0,00" oninput="formatAndSave(this)"></div>
                    <div>
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                            <label style="margin:0">Renda Extra</label>
                            <span class="card-total-badge extra" id="extra-total">R$ 0,00</span>
                        </div>
                        <div style="display:flex;gap:6px;margin-bottom:6px">
                            <input type="text" id="extra-desc" placeholder="Descrição" style="font-size:0.82rem;padding:7px 8px">
                            <input type="text" id="extra-val" placeholder="R$ 0,00" style="max-width:110px;font-size:0.82rem;padding:7px 8px" oninput="fmtExtra(this)">
                            <button onclick="addExtraRenda()" style="background:var(--success);color:white;border:none;padding:7px 12px;border-radius:8px;font-weight:800;cursor:pointer;font-size:0.9rem;flex-shrink:0">+</button>
                        </div>
                        <div id="extra-list" style="display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto"></div>
                        <!-- hidden legacy field for compatibility -->
                        <input type="hidden" id="income-extra" value="R$ 0,00">
                    </div>
                </div>
            </div>
        </div>
        <div class="main-layout">
            <div class="section-card">
                <div class="card-title">
                    <div class="card-title-left">
                        <h3 style="margin:0">📋 Despesas</h3>
                        <span class="card-total-badge" id="exp-total-badge">R$ 0,00</span>
                    </div>
                    <button class="btn-add" onclick="addRow('exp-list','','R$ 0,00','R$ 0,00',true)">+</button>
                </div>
                <div style="overflow-x:auto"><div style="min-width:420px"><div class="col-headers"><span>Item</span><span>Meta</span><span>Valor</span><span style="text-align:center">Venc.</span><span></span></div>
                <div id="exp-list"></div></div></div>
            </div>
            <div class="section-card">
                <div class="card-title">
                    <div class="card-title-left">
                        <h3 style="margin:0">📺 Assinaturas</h3>
                        <span class="card-total-badge" id="sub-total-badge">R$ 0,00</span>
                    </div>
                    <button class="btn-add" onclick="addRow('sub-list','','R$ 0,00','R$ 0,00',true)">+</button>
                </div>
                <div style="overflow-x:auto"><div style="min-width:420px"><div class="col-headers"><span>Item</span><span>Meta</span><span>Valor</span><span style="text-align:center">Venc.</span><span></span></div>
                <div id="sub-list"></div></div></div>
            </div>
        </div>
        <h3 style="margin-top:35px;color:var(--accent);">🗓️ Planejamento de Semanas</h3>
        <div class="weeks-container" id="weeks-grid"></div>
        <div class="summary-pair" style="margin-top:25px;margin-bottom:15px;">
            <div class="stat-card green">
                <label>💰 Dinheiro que Sobrou</label>
                <h2 id="leftover-val" style="color:var(--success);">R$ 0,00</h2>
            </div>
            <div class="stat-card red">
                <label>💸 Total de Gastos</label>
                <h2 id="total-spent-val" style="color:var(--danger);">R$ 0,00</h2>
            </div>
        </div>
        <div class="reserve-card" id="reserve-card" style="margin-bottom:30px;">
            <label>🏦 Reserva do Mês</label>
            <h2 id="savings-box">RESERVAR: R$ 0,00</h2>
        </div>
    </div>
</main>
<div id="pwa-install-banner" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;">
    <button onclick="installPWA()" style="background:var(--accent);color:var(--bg);border:none;padding:15px 20px;border-radius:12px;font-weight:800;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px;"><span>📥</span> Instalar App</button>
</div>
<script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
    let deferredPrompt;
    const installBanner=document.getElementById('pwa-install-banner');
    window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;installBanner.style.display='block';});
    function installPWA(){installBanner.style.display='none';deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}
</script>
<script>
    const formatter=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
    let currentSelectedMonth="";
    let db=JSON.parse(localStorage.getItem('finance_pro_autosave'))||{};

    function toggleMenu(){
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function generateMonthTabs(){
        const tabsContainer=document.getElementById('month-tabs');
        const now=new Date();
        for(let i=-2;i<=6;i++){
            const date=new Date(now.getFullYear(),now.getMonth()+i,1);
            const monthKey=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
            const btn=document.createElement('div');
            btn.className=`month-tab ${i===0?'active':''}`;
            btn.innerText=date.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).toUpperCase();
            btn.onclick=()=>selectMonth(monthKey,btn);
            tabsContainer.appendChild(btn);
            if(i===0) currentSelectedMonth=monthKey;
        }
    }

    function selectMonth(monthKey,element){
        document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
        element.classList.add('active');
        currentSelectedMonth=monthKey;
        loadMonthData();
    }

    function parseValue(val){
        if(!val) return 0;
        return parseFloat(val.replace(/[^\d]/g,""))/100;
    }

    function formatAndSave(input){
        let value=input.value.replace(/\D/g,"");
        input.value=formatter.format(value/100);
        calculate();
    }

    function addRow(containerId,name="",plan="R$ 0,00",real="R$ 0,00",isManual=false,due=""){
        const container=document.getElementById(containerId);
        const div=document.createElement('div');
        div.className='row';
        div.innerHTML=`<input type="text" value="${name}" placeholder="Item" oninput="calculate()"><input type="text" oninput="formatAndSave(this)" value="${plan}"><input type="text" oninput="formatAndSave(this)" value="${real}"><input type="text" class="due-input" maxlength="2" placeholder="Dia" value="${due}" oninput="fmtDue(this)" title="Dia de vencimento"><button class="btn-del" onclick="this.parentElement.remove();calculate()">✕</button>`;
        container.appendChild(div);
        if(isManual) calculate();
    }

    function fmtDue(input){
        let v=input.value.replace(/\D/g,'');
        if(v){let n=parseInt(v);if(n<1)n=1;if(n>31)n=31;v=String(n);}
        input.value=v;
        calculate();
    }

    function getWeekItems(card){
        return Array.from(card.querySelectorAll('.week-item-row')).map(r => {
            const dayKey = r.dataset.dayKey;
            if (dayKey) {
                return { name: dayKey, val: r.querySelector('.wi-val').value };
            }
            return { name: r.children[0].value, val: r.children[1].value };
        });
    }

    function addWeekItem(btn, val='', name='') {
        const container = btn.previousElementSibling;
        const row = document.createElement('div');
        const isDaySync = /^📅 \d{4}-\d{2}-\d{2}$/.test(name);

        if (isDaySync) {
            const [, dateStr] = name.split(' ');
            const [y, m, d] = dateStr.split('-');
            const dateLabel = `${d}/${m}`;
            row.className = 'week-item-row';
            row.dataset.dayKey = name;
            row.style.cssText = 'background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.2);border-radius:8px;padding:4px 8px;';
            row.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">
                    <span style="font-size:0.75rem;font-weight:800;color:var(--accent);white-space:nowrap;flex-shrink:0">📅 ${dateLabel}</span>
                    <input type="text" class="wi-desc" placeholder="Descrição (opcional)" oninput="calculate()" style="font-size:0.8rem;padding:6px 8px;color:#94a3b8;border-color:rgba(34,211,238,0.15);min-width:0;">
                </div>
                <input type="text" class="wi-val" placeholder="R$ 0,00" value="${val}" oninput="fmtWeekItem(this)" style="width:100px;font-weight:800;color:var(--accent);">
                <button class="btn-del-item" onclick="this.parentElement.remove();calculate()">✕</button>`;
        } else {
            row.className = 'week-item-row';
            row.innerHTML = `<input type="text" placeholder="Descrição" value="${name}" oninput="calculate()"><input type="text" class="wi-val" placeholder="R$ 0,00" value="${val}" oninput="fmtWeekItem(this)" style="width:110px"><button class="btn-del-item" onclick="this.parentElement.remove();calculate()">✕</button>`;
        }

        container.appendChild(row);
        calculate();
    }

    function fmtWeekItem(input){
        let value=input.value.replace(/\D/g,"");
        input.value=formatter.format(value/100);
        calculate();
    }

    // ── RENDA EXTRA ────────────────────────────────────────────────────────
    function fmtExtra(input){
        let v=input.value.replace(/\D/g,'');
        input.value=v?formatter.format(parseFloat(v)/100):'';
    }

    function addExtraRenda(){
        const desc=document.getElementById('extra-desc').value.trim()||'Extra';
        const val=document.getElementById('extra-val').value;
        if(!parseValue(val)) return;
        if(!db[currentSelectedMonth]) db[currentSelectedMonth]={extraRendas:[]};
        if(!db[currentSelectedMonth].extraRendas) db[currentSelectedMonth].extraRendas=[];
        db[currentSelectedMonth].extraRendas.push({id:Date.now(),desc,val});
        document.getElementById('extra-desc').value='';
        document.getElementById('extra-val').value='';
        renderExtraRendas();
        calculate();
    }

    function deleteExtraRenda(id){
        if(!db[currentSelectedMonth]||!db[currentSelectedMonth].extraRendas) return;
        db[currentSelectedMonth].extraRendas=db[currentSelectedMonth].extraRendas.filter(r=>r.id!==id);
        renderExtraRendas();
        calculate();
    }

    function renderExtraRendas(){
        const list=document.getElementById('extra-list');
        if(!list) return;
        const extras=(db[currentSelectedMonth]&&db[currentSelectedMonth].extraRendas)||[];
        const total=extras.reduce((s,r)=>s+parseValue(r.val),0);
        const totalEl=document.getElementById('extra-total');
        if(totalEl) totalEl.textContent=formatter.format(total);
        list.innerHTML='';
        extras.forEach(r=>{
            const el=document.createElement('div');
            el.style.cssText='display:flex;justify-content:space-between;align-items:center;background:#0f172a;border-radius:6px;padding:5px 8px;font-size:0.8rem';
            el.innerHTML='<span style="color:#f1f5f9;font-weight:600"></span><div style="display:flex;align-items:center;gap:6px"><span style="color:var(--success);font-weight:800"></span><button style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.8rem;padding:0 2px">✕</button></div>';
            el.querySelector('span').textContent=r.desc;
            el.querySelectorAll('span')[1].textContent=r.val;
            el.querySelector('button').addEventListener('click',()=>deleteExtraRenda(r.id));
            list.appendChild(el);
        });
    }

    // ── CÁLCULO PRINCIPAL ──────────────────────────────────────────────────
    function calculate(){
        const income=document.getElementById('income').value;
        const extraRendas=(db[currentSelectedMonth]&&db[currentSelectedMonth].extraRendas)||[];
        const incomeExtraNum=extraRendas.reduce((s,r)=>s+parseValue(r.val),0);
        const incomeExtra=document.getElementById('income-extra').value=formatter.format(incomeExtraNum);
        const strategy=document.getElementById('smart-strategy').value;
        const expRows=Array.from(document.querySelectorAll('#exp-list .row'));
        const subRows=Array.from(document.querySelectorAll('#sub-list .row'));
        const weekCards=Array.from(document.querySelectorAll('.week-card'));

        const exp=expRows.map(r=>({n:r.children[0].value,p:r.children[1].value,r:r.children[2].value,d:r.children[3].value}));
        const sub=subRows.map(r=>({n:r.children[0].value,p:r.children[1].value,r:r.children[2].value,d:r.children[3].value}));

        // Highlight due date fields if todayDay >= due day
        const todayDay=new Date().getDate();
        [...expRows,...subRows].forEach(row=>{
            const inp=row.querySelector('.due-input');
            if(!inp) return;
            const due=parseInt(inp.value);
            if(due && todayDay>due){
                inp.style.background='rgba(239,68,68,0.15)';
                inp.style.borderColor='var(--danger)';
                inp.style.color='var(--danger)';
            } else {
                inp.style.background='';
                inp.style.borderColor='rgba(245,158,11,0.3)';
                inp.style.color='var(--warn)';
            }
        });

        // Salvar
        const weeksData=weekCards.map(card=>({
            items:getWeekItems(card),
            end:card.querySelector('.w-spent').dataset.end
        }));
        const extraRendas2=(db[currentSelectedMonth]&&db[currentSelectedMonth].extraRendas)||[];
        db[currentSelectedMonth]={income,incomeExtra,exp,sub,weeksData,strategy,extraRendas:extraRendas2};
        localStorage.setItem('finance_pro_autosave',JSON.stringify(db));

        // Renda total
        const totalInc=parseValue(income)+parseValue(incomeExtra);

        // Total de despesas fixas (valor real)
        let totalFixoReal=0;
        let totalExp=0, totalSub=0;
        exp.forEach(item=>{ const v=parseValue(item.r); totalFixoReal+=v; totalExp+=v; });
        sub.forEach(item=>{ const v=parseValue(item.r); totalFixoReal+=v; totalSub+=v; });
        const expBadge=document.getElementById('exp-total-badge');
        const subBadge=document.getElementById('sub-total-badge');
        if(expBadge) expBadge.textContent=formatter.format(totalExp);
        if(subBadge) subBadge.textContent=formatter.format(totalSub);

        // Dinheiro livre para semanas = renda - despesas fixas
        const livreTotal=totalInc-totalFixoReal;

        const today=new Date(); today.setHours(0,0,0,0);
        const totalSemanas=weekCards.length||1;

        // Montar info de cada semana
        const weeksInfo=weekCards.map(card=>{
            const hiddenInput=card.querySelector('.w-spent');
            const startDate=new Date(hiddenInput.dataset.start);
            const endDate=new Date(hiddenInput.dataset.end);
            const isPast=today>endDate;
            const gasto=Array.from(card.querySelectorAll('.week-item-row .wi-val, .week-item-row input[placeholder="R$ 0,00"]'))
                .reduce((s,i)=>s+parseValue(i.value),0);
            return {card,startDate,endDate,isPast,gasto};
        });

        // Soma de gasto total nas semanas
        let gastoTotalSemanas=0;
        weeksInfo.forEach(w=>gastoTotalSemanas+=w.gasto);

        // Estratégia "reserve": meta fixa por semana
        const metaFixa=livreTotal/totalSemanas;

        // Pool para estratégia "balanced":
        // começa com livreTotal, subtrai gastos das semanas passadas
        // para cada semana ativa/futura, distribui o pool restante
        let pool=livreTotal;
        weeksInfo.forEach(w=>{ if(w.isPast) pool-=w.gasto; });
        let semanasRestantes=weeksInfo.filter(w=>!w.isPast).length;

        weeksInfo.forEach(w=>{
            const metaDisplay=w.card.querySelector('.w-meta');
            const budgetDisplay=w.card.querySelector('.w-budget-val');
            const totalValDisplay=w.card.querySelector('.week-total-val');

            if(totalValDisplay) totalValDisplay.textContent=formatter.format(w.gasto);

            if(w.isPast){
                w.card.classList.add('past');
                w.card.classList.remove('over');
                if(metaDisplay){metaDisplay.innerText='—';metaDisplay.style.color='var(--locked)';}
                if(budgetDisplay){budgetDisplay.innerText='—';budgetDisplay.style.color='var(--locked)';}
            } else {
                w.card.classList.remove('past');

                // Orçamento desta semana
                let orcamento;
                if(strategy==='balanced'){
                    orcamento=semanasRestantes>0?(pool/semanasRestantes):0;
                } else {
                    orcamento=metaFixa;
                }
                orcamento=Math.max(0,orcamento);

                if(budgetDisplay){
                    budgetDisplay.innerText=formatter.format(orcamento);
                    budgetDisplay.style.color='var(--accent)';
                }

                // Quanto ainda pode gastar (orçamento - já gasto esta semana)
                const podeGastar=orcamento-w.gasto;
                if(metaDisplay){
                    metaDisplay.innerText=formatter.format(Math.max(0,podeGastar));
                    metaDisplay.style.color=podeGastar<0?'var(--danger)':'var(--success)';
                }
                w.card.classList.toggle('over',podeGastar<0);

                // Deduz gasto desta semana do pool para a próxima
                pool-=w.gasto;
                semanasRestantes--;
            }
        });

        // Totais finais
        const sobrou=livreTotal-gastoTotalSemanas;
        document.getElementById('leftover-val').innerText=formatter.format(sobrou);
        document.getElementById('total-spent-val').innerText=formatter.format(totalFixoReal+gastoTotalSemanas);

        const box=document.getElementById('savings-box');
        const reserveCard=document.getElementById('reserve-card');
        box.innerText='RESERVAR: '+formatter.format(sobrou);
        reserveCard.classList.toggle('negative',sobrou<0);
    }

    // ── HERANÇA DE MÊS ANTERIOR ────────────────────────────────────────────
    function getPrevMonthKey(monthKey){
        const [y,m]=monthKey.split('-').map(Number);
        const d=new Date(y,m-2,1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }

    // Retorna itens herdados do mês anterior: valor real vira meta, valor zerado
    function getInheritedItems(monthKey){
        const prev=db[getPrevMonthKey(monthKey)];
        if(!prev) return null;
        const exp=(prev.exp||[]).filter(e=>e.n&&e.n.trim()).map(e=>({n:e.n,p:e.r||'R$ 0,00',r:'R$ 0,00'}));
        const sub=(prev.sub||[]).filter(s=>s.n&&s.n.trim()).map(s=>({n:s.n,p:s.r||'R$ 0,00',r:'R$ 0,00'}));
        return {exp,sub};
    }

    function loadMonthData(){
        document.getElementById('exp-list').innerHTML='';
        document.getElementById('sub-list').innerHTML='';

        const data=db[currentSelectedMonth]||{};
        const inherited=getInheritedItems(currentSelectedMonth);
        const prevData=db[getPrevMonthKey(currentSelectedMonth)]||{};

        // Renda e estratégia: usa o salvo, ou herda do anterior, ou padrão
        document.getElementById('income').value=data.income||prevData.income||'R$ 0,00';
        // Load extra rendas list
        const extraRendasData=data.extraRendas||prevData.extraRendas||[];
        db[currentSelectedMonth]=db[currentSelectedMonth]||{};
        db[currentSelectedMonth].extraRendas=extraRendasData;
        renderExtraRendas();
        document.getElementById('smart-strategy').value=data.strategy||prevData.strategy||'balanced';

        // Despesas: usa as salvas se existirem com itens, senão herda do anterior
        const expToLoad=(data.exp&&data.exp.length>0)?data.exp:(inherited?inherited.exp:[]);
        const subToLoad=(data.sub&&data.sub.length>0)?data.sub:(inherited?inherited.sub:[]);

        expToLoad.forEach(e=>addRow('exp-list',e.n,e.p,e.r,false,e.d||''));
        subToLoad.forEach(s=>addRow('sub-list',s.n,s.p,s.r,false,s.d||''));

        renderWeeks(currentSelectedMonth,data.weeksData||[]);
        calculate();
    }

    function renderWeeks(monthStr,savedWeeksData=[]){
        const [y,m]=monthStr.split('-').map(Number);
        const grid=document.getElementById('weeks-grid');
        grid.innerHTML='';
        let date=new Date(y,m-1,1);
        let weekNum=1;
        while(date.getMonth()===m-1){
            let start=new Date(date);
            let end=new Date(date);
            end.setDate(date.getDate()+(6-date.getDay()));
            if(end.getMonth()!==m-1) end=new Date(y,m,0);
            const startFmt=start.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
            const endFmt=end.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
            const savedWeek=savedWeeksData[weekNum-1]||{items:[]};
            const weekDiv=document.createElement('div');
            weekDiv.className='week-card';
            weekDiv.innerHTML=`
                <div class="week-header">
                    <div>
                        <label style="margin:0">Semana ${weekNum}</label>
                        <span class="week-dates">${startFmt} – ${endFmt}</span>
                    </div>
                    <span class="status-badge">ENCERRADA</span>
                </div>
                <div class="week-budget-row">
                    <div class="week-budget-block">
                        <span class="week-budget-label">💡 Pode Gastar</span>
                        <div class="w-budget-val">R$ 0,00</div>
                    </div>
                    <div class="week-budget-block">
                        <span class="week-budget-label">✅ Ainda Disponível</span>
                        <div class="w-meta">R$ 0,00</div>
                    </div>
                </div>
                <input type="hidden" class="w-spent"
                    data-start="${start.toISOString()}"
                    data-end="${end.toISOString()}"
                    value="R$ 0,00">
                <div class="week-items">
                    <div class="week-item-list"></div>
                    <button class="btn-add-item" onclick="addWeekItem(this)">+ Adicionar Gasto</button>
                </div>
                <div class="week-total-row">
                    <span class="week-total-label">Total Gasto</span>
                    <span class="week-total-val">R$ 0,00</span>
                </div>`;
            const addBtn=weekDiv.querySelector('.btn-add-item');
            (savedWeek.items||[]).forEach(item=>addWeekItem(addBtn,item.val,item.name));
            grid.appendChild(weekDiv);
            date.setDate(date.getDate()+(7-date.getDay()));
            weekNum++;
        }
    }

    window.onload=()=>{generateMonthTabs();loadMonthData();};
</script>
