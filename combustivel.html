<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro | Combustível</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #22d3ee;
            --success: #10b981; --danger: #ef4444; --text: #f1f5f9; --border: #334155;
            --warn: #f59e0b; --sidebar-w: 260px; --fuel: #f97316;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .main-content { padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .top-bar { display: flex; align-items: center; padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); gap: 20px; }
        .menu-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
        .nav-logo { font-size: 1.3rem; font-weight: 800; color: var(--accent); text-decoration: none; }
        .sidebar { position: fixed; top: 0; left: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100%; background: #111827; border-right: 1px solid var(--border); transition: 0.3s ease; z-index: 1000; padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .close-btn { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }
        .side-link { padding: 12px 15px; border-radius: 8px; text-decoration: none; color: var(--text); font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .side-link:hover { background: var(--card-bg); color: var(--accent); }
        .side-link.active { background: var(--accent); color: var(--bg); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
        .stat-card { background: var(--card-bg); border-radius: 16px; padding: 18px; border: 1px solid var(--border); text-align: center; }
        .stat-card.c-fuel { border-color: var(--fuel); }
        .stat-card.c-blue { border-color: var(--accent); }
        .stat-card.c-warn { border-color: var(--warn); }
        .stat-val { font-size: 1.4rem; font-weight: 800; margin-top: 4px; }
        .form-card { background: var(--card-bg); border-radius: 16px; padding: 22px; border: 1px solid var(--border); margin-bottom: 25px; }
        .form-title { font-size: 1rem; font-weight: 800; margin: 0 0 18px 0; color: var(--fuel); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
        @media (max-width: 700px) { .form-row { grid-template-columns: 1fr 1fr; } }
        input[type="text"], input[type="date"], input[type="number"], select {
            background: #0f172a; border: 1px solid var(--border); color: white;
            padding: 11px 10px; border-radius: 8px; width: 100%; font-size: 0.95rem; outline: none; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--fuel); }
        .btn-register { background: var(--fuel); color: white; border: none; padding: 12px 18px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 0.95rem; white-space: nowrap; height: 44px; }
        .btn-register:hover { background: #ea6c0a; }
        @media (max-width: 700px) { .btn-register { grid-column: 1/-1; height: auto; padding: 13px; } }
        .chart-card { background: var(--card-bg); border-radius: 16px; padding: 22px; border: 1px solid var(--border); margin-bottom: 25px; }
        .chart-title { font-weight: 800; margin: 0 0 20px 0; font-size: 1rem; }
        .chart-wrap { height: 200px; display: flex; align-items: flex-end; gap: 8px; }
        .chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; height: 100%; }
        .chart-bar-bg { width: 100%; flex: 1; display: flex; align-items: flex-end; }
        .chart-bar { width: 100%; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, var(--fuel) 0%, #c2440f 100%); min-height: 4px; transition: height 0.5s ease; position: relative; cursor: pointer; }
        .chart-bar:hover { opacity: 0.8; }
        .chart-bar .tooltip { display: none; position: absolute; bottom: 108%; left: 50%; transform: translateX(-50%); background: #0f172a; border: 1px solid var(--fuel); color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; z-index: 10; }
        .chart-bar:hover .tooltip { display: block; }
        .chart-label { font-size: 0.6rem; color: #64748b; font-weight: 700; text-align: center; text-transform: uppercase; }
        .chart-empty { color: #475569; text-align: center; width: 100%; font-size: 0.9rem; align-self: center; }
        .history-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); overflow: hidden; }
        .history-body-wrap { overflow-x: auto; }
        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .history-header h3 { margin: 0; font-size: 1rem; }
        .history-header select { max-width: 180px; border-color: var(--accent); }
        .history-table { width: 100%; min-width: 320px; border-collapse: collapse; font-size: 0.9rem; }
        .history-table th { text-align: left; padding: 8px 10px; font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid var(--border); }
        .history-table td { padding: 13px 10px; border-bottom: 1px solid #1a2540; vertical-align: middle; }
        .history-table tr:last-child td { border-bottom: none; }
        .history-table tr:hover td { background: rgba(255,255,255,0.02); }
        @media (max-width: 560px) {
            .history-table td.td-preco,
            .history-table th.th-preco,
            .history-table td.td-litros,
            .history-table th.th-litros { display: none; }
        }
        .badge-tipo { display: inline-block; font-size: 0.65rem; font-weight: 800; padding: 3px 9px; border-radius: 50px; text-transform: uppercase; }
        .badge-gasolina { background: rgba(249,115,22,0.15); color: var(--fuel); border: 1px solid var(--fuel); }
        .badge-etanol   { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-diesel   { background: rgba(34,211,238,0.15); color: var(--accent); border: 1px solid var(--accent); }
        .badge-gnv      { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid var(--warn); }
        .btn-del-row { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px 8px; border-radius: 6px; }
        .btn-del-row:hover { background: rgba(239,68,68,0.1); }
        .empty-msg { text-align: center; color: #475569; padding: 40px 0; font-size: 0.9rem; }
        .total-row td { font-size: 0.82rem; color: #64748b; border-top: 2px solid var(--border) !important; padding-top: 14px !important; }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="nav-logo">Finance Pro</span>
        <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    <div class="side-menu">
        <a href="index.html" class="side-link"><span>📊</span> Painel Principal</a>
        <a href="diaadia.html" class="side-link"><span>📅</span> Dia a Dia</a>
        <a href="notas.html" class="side-link"><span>📝</span> Anotações</a>
        <a href="combustivel.html" class="side-link active"><span>⛽</span> Combustível</a>
        <a href="#" class="side-link" onclick="alert('Funcionalidade em breve!')"><span>⚙️</span> Configurações</a>
    </div>
</div>
<header class="top-bar">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="nav-logo">Finance Pro</a>
</header>
<main class="main-content">
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card c-fuel">
                <label>⛽ Gasto este mês</label>
                <div class="stat-val" id="stat-mes" style="color:var(--fuel)">R$ 0,00</div>
            </div>
            <div class="stat-card c-blue">
                <label>🔢 Litros este mês</label>
                <div class="stat-val" id="stat-litros" style="color:var(--accent)">0,0 L</div>
            </div>
            <div class="stat-card c-warn">
                <label>💧 Preço médio/L</label>
                <div class="stat-val" id="stat-preco" style="color:var(--warn)">R$ 0,00</div>
            </div>
        </div>
        <div class="form-card">
            <p class="form-title">⛽ Registrar Abastecimento</p>
            <div class="form-row">
                <div><label>Data</label><input type="date" id="f-data"></div>
                <div><label>Combustível</label>
                    <select id="f-tipo">
                        <option value="Gasolina">Gasolina</option>
                        <option value="Etanol">Etanol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="GNV">GNV</option>
                    </select>
                </div>
                <div><label>Litros</label><input type="text" id="f-litros" placeholder="0,00" oninput="fmtLitros(this)"></div>
                <div><label>Preço/Litro (R$)</label><input type="text" id="f-preco" placeholder="R$ 0,000" oninput="fmtPreco(this)"></div>
                <div><label>Total (R$)</label><input type="text" id="f-total" placeholder="R$ 0,00" oninput="fmtTotal(this)"></div>
                <button class="btn-register" onclick="addAbastecimento()">+ Registrar</button>
            </div>
        </div>
        <div class="chart-card">
            <p class="chart-title">📊 Gastos por Mês</p>
            <div class="chart-wrap" id="chart-wrap">
                <span class="chart-empty">Nenhum dado ainda.</span>
            </div>
        </div>
        <div class="history-card">
            <div class="history-header">
                <h3>📋 Histórico de Abastecimentos</h3>
                <select id="filtro-mes" onchange="renderHistorico()">
                    <option value="all">Todos os meses</option>
                </select>
            </div>
            <div class="history-body-wrap"><div id="history-body"><div class="empty-msg">Nenhum abastecimento registrado ainda.</div></div></div>
        </div>
    </div>
</main>
<script>
    const fmtBRL = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
    const fmtDate = d => { const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
    const formatter = new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'});
    let registros = JSON.parse(localStorage.getItem('fp_combustivel')) || [];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    window.onload = () => {
        document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
        renderAll();
    };

    // Formatação igual ao painel principal: digita números, formata automaticamente
    function parseBRL(val) {
        return parseFloat(val.replace(/[^\d]/g, '')) / 100 || 0;
    }
    function parseLitros(val) {
        return parseFloat(val.replace(/[^\d]/g, '')) / 1000 || 0;
    }
    function parsePreco(val) {
        return parseFloat(val.replace(/[^\d]/g, '')) / 1000 || 0;
    }

    function fmtLitros(input) {
        const digits = input.value.replace(/\D/g, '');
        const num = parseFloat(digits) / 1000;
        input.value = digits ? num.toFixed(3).replace('.', ',') + ' L' : '';
        autoSyncFields('litros');
    }

    function fmtPreco(input) {
        const digits = input.value.replace(/\D/g, '');
        const num = parseFloat(digits) / 1000;
        input.value = digits ? 'R$ ' + num.toFixed(3).replace('.', ',') : '';
        autoSyncFields('preco');
    }

    function fmtTotal(input) {
        const digits = input.value.replace(/\D/g, '');
        const num = parseFloat(digits) / 100;
        input.value = digits ? formatter.format(num) : '';
        autoSyncFields('total');
    }

    function autoSyncFields(changed) {
        const litros = parseLitros(document.getElementById('f-litros').value);
        const preco  = parsePreco(document.getElementById('f-preco').value);
        const total  = parseBRL(document.getElementById('f-total').value);

        if (changed === 'litros') {
            // litros + preco → total
            if (litros > 0 && preco > 0)
                document.getElementById('f-total').value = formatter.format(litros * preco);
            // litros + total → preco
            else if (litros > 0 && total > 0)
                document.getElementById('f-preco').value = 'R$ ' + (total / litros).toFixed(3).replace('.', ',');
        }
        if (changed === 'preco') {
            // preco + litros → total
            if (preco > 0 && litros > 0)
                document.getElementById('f-total').value = formatter.format(litros * preco);
            // preco + total → litros
            else if (preco > 0 && total > 0)
                document.getElementById('f-litros').value = (total / preco).toFixed(3).replace('.', ',') + ' L';
        }
        if (changed === 'total') {
            // total + preco → litros
            if (total > 0 && preco > 0)
                document.getElementById('f-litros').value = (total / preco).toFixed(3).replace('.', ',') + ' L';
            // total + litros → preco
            else if (total > 0 && litros > 0)
                document.getElementById('f-preco').value = 'R$ ' + (total / litros).toFixed(3).replace('.', ',');
        }
    }

    function addAbastecimento() {
        const data   = document.getElementById('f-data').value;
        const tipo   = document.getElementById('f-tipo').value;
        const litros = parseLitros(document.getElementById('f-litros').value);
        const total  = parseBRL(document.getElementById('f-total').value);
        const preco  = parsePreco(document.getElementById('f-preco').value) || (litros > 0 && total ? total / litros : 0);
        if (!data || !total) { alert('Preencha pelo menos: Data e Valor Total.'); return; }
        registros.unshift({id: Date.now(), data, tipo, litros, preco, total});
        save();
        ['f-litros','f-preco','f-total'].forEach(id => document.getElementById(id).value = '');
    }

    function deleteRegistro(id) {
        registros = registros.filter(r=>r.id!==id);
        save();
    }

    function save() {
        localStorage.setItem('fp_combustivel', JSON.stringify(registros));
        renderAll();
    }

    function renderAll() {
        populateFiltroMes();
        renderStats();
        renderChart();
        renderHistorico();
    }

    function renderStats() {
        const agora = new Date();
        const mesAtual = `${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}`;
        const doMes = registros.filter(r=>r.data.slice(0,7)===mesAtual);
        const totalMes = doMes.reduce((s,r)=>s+r.total,0);
        const totalL   = doMes.reduce((s,r)=>s+r.litros,0);
        const precoMed = totalL>0 ? totalMes/totalL : 0;
        document.getElementById('stat-mes').textContent    = fmtBRL(totalMes);
        document.getElementById('stat-litros').textContent = totalL.toFixed(1)+' L';
        document.getElementById('stat-preco').textContent  = fmtBRL(precoMed);
    }

    function renderChart() {
        const byMonth = {};
        registros.forEach(r=>{ const k=r.data.slice(0,7); byMonth[k]=(byMonth[k]||0)+r.total; });
        const sorted = Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8);
        const wrap = document.getElementById('chart-wrap');
        if (sorted.length===0){ wrap.innerHTML='<span class="chart-empty">Nenhum dado ainda.</span>'; return; }
        const maxVal = Math.max(...sorted.map(([,v])=>v));
        wrap.innerHTML='';
        sorted.forEach(([mes,val])=>{
            const [y,m]=mes.split('-');
            const label=new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase();
            const pct=maxVal>0?(val/maxVal)*100:0;
            const group=document.createElement('div');
            group.className='chart-bar-group';
            group.innerHTML=`<div class="chart-bar-bg"><div class="chart-bar" style="height:${Math.max(pct,2)}%"><span class="tooltip">${fmtBRL(val)}</span></div></div><span class="chart-label">${label}</span>`;
            wrap.appendChild(group);
        });
    }

    function populateFiltroMes() {
        const sel=document.getElementById('filtro-mes');
        const current=sel.value;
        const meses=[...new Set(registros.map(r=>r.data.slice(0,7)))].sort().reverse();
        sel.innerHTML='<option value="all">Todos os meses</option>';
        meses.forEach(m=>{
            const [y,mo]=m.split('-');
            const label=new Date(y,mo-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
            const cap=label.charAt(0).toUpperCase()+label.slice(1);
            sel.innerHTML+=`<option value="${m}" ${m===current?'selected':''}>${cap}</option>`;
        });
    }

    function renderHistorico() {
        const filtro=document.getElementById('filtro-mes').value;
        const lista=filtro==='all'?registros:registros.filter(r=>r.data.slice(0,7)===filtro);
        const body=document.getElementById('history-body');
        if (lista.length===0){
            body.innerHTML=`<div class="empty-msg">Nenhum abastecimento ${filtro!=='all'?'neste mês':'registrado'}.</div>`;
            return;
        }
        const badgeMap={Gasolina:'gasolina',Etanol:'etanol',Diesel:'diesel',GNV:'gnv'};
        const table=document.createElement('table');
        table.className='history-table';
        table.innerHTML=`<thead><tr><th>Data</th><th>Tipo</th><th class="th-litros">Litros</th><th class="th-preco">Preço/L</th><th>Total</th><th></th></tr></thead>`;
        const tbody=document.createElement('tbody');
        lista.forEach(r=>{
            const tr=document.createElement('tr');
            tr.innerHTML=`
                <td>${fmtDate(r.data)}</td>
                <td><span class="badge-tipo badge-${badgeMap[r.tipo]||'gasolina'}">${r.tipo}</span></td>
                <td class="td-litros">${r.litros>0?r.litros.toFixed(2)+' L':'—'}</td>
                <td class="td-preco">${r.preco>0?fmtBRL(r.preco):'—'}</td>
                <td style="font-weight:800;color:var(--fuel)">${fmtBRL(r.total)}</td>
                <td><button class="btn-del-row">✕</button></td>`;
            tr.querySelector('.btn-del-row').addEventListener('click',()=>deleteRegistro(r.id));
            tbody.appendChild(tr);
        });
        if (lista.length>1){
            const totalP=lista.reduce((s,r)=>s+r.total,0);
            const totalL=lista.reduce((s,r)=>s+r.litros,0);
            const tf=document.createElement('tr');
            tf.className='total-row';
            tf.innerHTML=`<td colspan="2" style="font-weight:800">TOTAL (${lista.length} abast.)</td><td style="font-weight:700">${totalL>0?totalL.toFixed(2)+' L':'—'}</td><td></td><td style="font-weight:800;color:var(--fuel)">${fmtBRL(totalP)}</td><td></td>`;
            tbody.appendChild(tf);
        }
        table.appendChild(tbody);
        body.innerHTML='';
        body.appendChild(table);
    }
</script>
</body>
</html>
